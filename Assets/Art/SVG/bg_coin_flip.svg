<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <radialGradient id="coinBg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a2a40"/>
      <stop offset="100%" stop-color="#080f1a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c8a020" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#c8a020" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="6"/></filter>
    <!-- 圆角矩形裁剪 -->
    <clipPath id="roundPanel">
      <rect x="20" y="20" width="760" height="560" rx="20" ry="20"/>
    </clipPath>
  </defs>

  <!-- 面板背景 -->
  <rect x="20" y="20" width="760" height="560" rx="20" fill="url(#coinBg)"/>

  <!-- 金色光晕 -->
  <rect x="20" y="20" width="760" height="560" rx="20" fill="url(#glow)"/>

  <!-- 外边框 -->
  <rect x="20" y="20" width="760" height="560" rx="20" fill="none" stroke="#c8a020" stroke-width="2" opacity="0.6"/>
  <rect x="23" y="23" width="754" height="554" rx="18" fill="none" stroke="#e8c840" stroke-width="0.5" opacity="0.3"/>

  <!-- 四角装饰 -->
  <g fill="none" stroke="#c8a020" stroke-width="1.5" opacity="0.7">
    <path d="M32,44 L32,32 L44,32"/>
    <path d="M756,44 L756,32 L744,32"/>
    <path d="M32,556 L32,568 L44,568"/>
    <path d="M756,556 L756,568 L744,568"/>
  </g>

  <!-- 顶部标题装饰线 -->
  <line x1="100" y1="80" x2="700" y2="80" stroke="#c8a020" stroke-width="0.5" opacity="0.4"/>
  <circle cx="400" cy="80" r="4" fill="#c8a020" opacity="0.5"/>

  <!-- 底部装饰线 -->
  <line x1="100" y1="520" x2="700" y2="520" stroke="#c8a020" stroke-width="0.5" opacity="0.4"/>
  <circle cx="400" cy="520" r="4" fill="#c8a020" opacity="0.5"/>

  <!-- 中心光斑 -->
  <circle cx="400" cy="300" r="160" fill="#c8a020" opacity="0.03" filter="url(#blur)"/>

  <!-- 星点 -->
  <g fill="#c8a020" opacity="0.3">
    <circle cx="80" cy="120" r="1"/>
    <circle cx="720" cy="150" r="1"/>
    <circle cx="100" cy="450" r="1"/>
    <circle cx="700" cy="420" r="1.5"/>
    <circle cx="200" cy="80" r="0.8"/>
    <circle cx="600" cy="520" r="0.8"/>
  </g>
</svg>
