<svg xmlns="http://www.w3.org/2000/svg" width="134" height="270" viewBox="0 0 134 270">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#0c1422"/>
      <stop offset="100%" stop-color="#080e18"/>
    </linearGradient>
    <linearGradient id="bH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#3a2008"/>
      <stop offset="30%" stop-color="#c88828"/>
      <stop offset="50%" stop-color="#e8b030"/>
      <stop offset="70%" stop-color="#c88828"/>
      <stop offset="100%" stop-color="#3a2008"/>
    </linearGradient>
    <linearGradient id="bV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#3a2008"/>
      <stop offset="30%" stop-color="#c88828"/>
      <stop offset="50%" stop-color="#e8b030"/>
      <stop offset="70%" stop-color="#c88828"/>
      <stop offset="100%" stop-color="#3a2008"/>
    </linearGradient>
    <filter id="g"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="134" height="270" fill="url(#bg)"/>
  <!-- Diagonals -->
  <g stroke="#0e1828" stroke-width="0.7" opacity="0.3">
    <line x1="0" y1="0" x2="134" y2="270"/>
    <line x1="0" y1="135" x2="67" y2="270"/>
    <line x1="67" y1="0" x2="134" y2="135"/>
    <line x1="134" y1="0" x2="0" y2="270"/>
    <line x1="67" y1="0" x2="0" y2="100"/>
    <line x1="134" y1="135" x2="34" y2="270"/>
  </g>
  <!-- Bronze bars -->
  <rect x="0" y="0" width="134" height="6" fill="url(#bH)"/>
  <rect x="0" y="264" width="134" height="6" fill="url(#bH)"/>
  <rect x="0" y="0" width="6" height="270" fill="url(#bV)"/>
  <rect x="128" y="0" width="6" height="270" fill="url(#bV)"/>
  <!-- Inner border -->
  <rect x="9" y="9" width="116" height="252" rx="1" fill="none" stroke="#8a5c18" stroke-width="1" opacity="0.7"/>
  <rect x="12" y="12" width="110" height="246" rx="1" fill="none" stroke="#c88828" stroke-width="0.5" opacity="0.3"/>
  <!-- Corner L-brackets -->
  <g stroke="#e8b030" stroke-width="2" fill="none" filter="url(#g)">
    <path d="M9,30 L9,9 L30,9"/>
    <path d="M104,9 L125,9 L125,30"/>
    <path d="M9,240 L9,261 L30,261"/>
    <path d="M104,261 L125,261 L125,240"/>
  </g>
  <g fill="#e8b030" filter="url(#g)">
    <rect x="7" y="7" width="4" height="4"/>
    <rect x="123" y="7" width="4" height="4"/>
    <rect x="7" y="259" width="4" height="4"/>
    <rect x="123" y="259" width="4" height="4"/>
  </g>
  <!-- Separator lines -->
  <rect x="12" y="54" width="110" height="1.5" fill="url(#bH)" opacity="0.6"/>
  <rect x="12" y="216" width="110" height="1.5" fill="url(#bH)" opacity="0.6"/>
</svg>
