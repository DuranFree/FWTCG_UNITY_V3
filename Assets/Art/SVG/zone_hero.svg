<svg xmlns="http://www.w3.org/2000/svg" width="134" height="270" viewBox="0 0 134 270">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#0c1422"/>
      <stop offset="100%" stop-color="#080e18"/>
    </linearGradient>
    <linearGradient id="bvH" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#d0a038" stop-opacity="0.65"/>
      <stop offset="25%" stop-color="#9a6018"/>
      <stop offset="70%" stop-color="#5e3408"/>
      <stop offset="100%" stop-color="#281000"/>
    </linearGradient>
    <linearGradient id="bvV" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#d0a038" stop-opacity="0.65"/>
      <stop offset="25%" stop-color="#9a6018"/>
      <stop offset="70%" stop-color="#5e3408"/>
      <stop offset="100%" stop-color="#281000"/>
    </linearGradient>
    <linearGradient id="acH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#b07818" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#d09828" stop-opacity="0.65"/>
      <stop offset="50%"  stop-color="#ecc848" stop-opacity="0.85"/>
      <stop offset="70%"  stop-color="#d09828" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#b07818" stop-opacity="0"/>
    </linearGradient>
    <pattern id="dp" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M8,0 L16,8 L8,16 L0,8 Z" fill="none" stroke="#111a2e" stroke-width="0.45"/>
    </pattern>
    <filter id="gg" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="rg" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="134" height="270" fill="url(#bg)"/>
  <rect width="134" height="270" fill="url(#dp)" opacity="0.16"/>

  <!-- Center gem (smaller) -->
  <g filter="url(#rg)" opacity="0.32">
    <polygon points="67,122 79,130 79,144 67,152 55,144 55,130" fill="none" stroke="#5838a8" stroke-width="1.2"/>
    <polygon points="67,127 75,133 75,141 67,147 59,141 59,133" fill="#100830" opacity="0.7"/>
    <line x1="67" y1="122" x2="67" y2="152" stroke="#7050c0" stroke-width="0.7" opacity="0.7"/>
    <line x1="55" y1="130" x2="79" y2="144" stroke="#7050c0" stroke-width="0.7" opacity="0.7"/>
    <line x1="79" y1="130" x2="55" y2="144" stroke="#7050c0" stroke-width="0.7" opacity="0.7"/>
    <circle cx="67" cy="137" r="2.5" fill="#a068e0"/>
  </g>

  <!-- BORDER shadow base -->
  <rect x="0"   y="0"   width="134" height="6" fill="#1c0a00"/>
  <rect x="0"   y="264" width="134" height="6" fill="#1c0a00"/>
  <rect x="0"   y="0"   width="6"   height="270" fill="#1c0a00"/>
  <rect x="128" y="0"   width="6"   height="270" fill="#1c0a00"/>
  <!-- BORDER bevel bars -->
  <rect x="0"   y="0"   width="134" height="4" fill="url(#bvH)"/>
  <rect x="0"   y="266" width="134" height="4" fill="url(#bvH)"/>
  <rect x="0"   y="0"   width="4"   height="270" fill="url(#bvV)"/>
  <rect x="130" y="0"   width="4"   height="270" fill="url(#bvV)"/>

  <!-- INNER BORDERS -->
  <rect x="8"  y="8"  width="118" height="254" fill="none" stroke="#5a3808" stroke-width="1" opacity="0.8"/>
  <rect x="11" y="11" width="112" height="248" fill="none" stroke="#906015" stroke-width="0.5" opacity="0.4"/>
  <!-- Inner accent lines -->
  <rect x="8" y="8"   width="118" height="1" fill="url(#acH)" opacity="0.55"/>
  <rect x="8" y="261" width="118" height="1" fill="url(#acH)" opacity="0.55"/>

  <!-- ===== CORNER MEDALLIONS (r=28) ===== -->
  <!-- TL (8,8) -->
  <g filter="url(#gg)">
    <g stroke="#3a2008" stroke-width="0.6" opacity="0.5">
      <line x1="8" y1="8" x2="36" y2="8"/>
      <line x1="8" y1="8" x2="35" y2="15"/>
      <line x1="8" y1="8" x2="28" y2="28"/>
      <line x1="8" y1="8" x2="15" y2="35"/>
      <line x1="8" y1="8" x2="8" y2="36"/>
    </g>
    <path d="M 8,36 A 28,28 0 0 1 36,8" fill="none" stroke="#9a6018" stroke-width="1.8"/>
    <path d="M 8,27 A 19,19 0 0 1 27,8" fill="none" stroke="#c08822" stroke-width="1" opacity="0.55"/>
    <g stroke="#cca030" stroke-width="1" opacity="0.9">
      <line x1="8"  y1="36" x2="10" y2="31"/>
      <line x1="28" y1="28" x2="30" y2="23"/>
      <line x1="36" y1="8"  x2="31" y2="10"/>
    </g>
    <rect x="6" y="6" width="4" height="4" fill="#e0b840"/>
  </g>
  <!-- TR (126,8) -->
  <g filter="url(#gg)">
    <g stroke="#3a2008" stroke-width="0.6" opacity="0.5">
      <line x1="126" y1="8" x2="98"  y2="8"/>
      <line x1="126" y1="8" x2="99"  y2="15"/>
      <line x1="126" y1="8" x2="106" y2="28"/>
      <line x1="126" y1="8" x2="111" y2="35"/>
      <line x1="126" y1="8" x2="126" y2="36"/>
    </g>
    <path d="M 98,8 A 28,28 0 0 1 126,36" fill="none" stroke="#9a6018" stroke-width="1.8"/>
    <path d="M 107,8 A 19,19 0 0 1 126,27" fill="none" stroke="#c08822" stroke-width="1" opacity="0.55"/>
    <g stroke="#cca030" stroke-width="1" opacity="0.9">
      <line x1="98"  y1="8"  x2="103" y2="10"/>
      <line x1="106" y1="28" x2="110" y2="23"/>
      <line x1="126" y1="36" x2="124" y2="31"/>
    </g>
    <rect x="124" y="6" width="4" height="4" fill="#e0b840"/>
  </g>
  <!-- BL (8,262) -->
  <g filter="url(#gg)">
    <g stroke="#3a2008" stroke-width="0.6" opacity="0.5">
      <line x1="8" y1="262" x2="36"  y2="262"/>
      <line x1="8" y1="262" x2="35"  y2="255"/>
      <line x1="8" y1="262" x2="28"  y2="242"/>
      <line x1="8" y1="262" x2="15"  y2="235"/>
      <line x1="8" y1="262" x2="8"   y2="234"/>
    </g>
    <path d="M 36,262 A 28,28 0 0 0 8,234" fill="none" stroke="#9a6018" stroke-width="1.8"/>
    <path d="M 27,262 A 19,19 0 0 0 8,243" fill="none" stroke="#c08822" stroke-width="1" opacity="0.55"/>
    <g stroke="#cca030" stroke-width="1" opacity="0.9">
      <line x1="36" y1="262" x2="33" y2="257"/>
      <line x1="8"  y1="234" x2="10" y2="239"/>
    </g>
    <rect x="6" y="260" width="4" height="4" fill="#e0b840"/>
  </g>
  <!-- BR (126,262) -->
  <g filter="url(#gg)">
    <g stroke="#3a2008" stroke-width="0.6" opacity="0.5">
      <line x1="126" y1="262" x2="98"  y2="262"/>
      <line x1="126" y1="262" x2="99"  y2="255"/>
      <line x1="126" y1="262" x2="106" y2="242"/>
      <line x1="126" y1="262" x2="111" y2="235"/>
      <line x1="126" y1="262" x2="126" y2="234"/>
    </g>
    <path d="M 126,234 A 28,28 0 0 1 98,262" fill="none" stroke="#9a6018" stroke-width="1.8"/>
    <path d="M 126,243 A 19,19 0 0 1 107,262" fill="none" stroke="#c08822" stroke-width="1" opacity="0.55"/>
    <g stroke="#cca030" stroke-width="1" opacity="0.9">
      <line x1="126" y1="234" x2="124" y2="239"/>
      <line x1="98"  y1="262" x2="103" y2="257"/>
    </g>
    <rect x="124" y="260" width="4" height="4" fill="#e0b840"/>
  </g>

  <!-- RUNE SYMBOLS — left edge -->
  <g filter="url(#rg)" stroke="#5060c8" stroke-width="1.1" fill="none">
    <g transform="translate(17,65)"><line x1="0" y1="-6" x2="0" y2="6"/><line x1="-4" y1="-2" x2="4" y2="-2"/><line x1="-3" y1="3" x2="3" y2="3"/></g>
    <g transform="translate(17,120)"><polyline points="-3,-6 0,6 3,-6"/><line x1="-3" y1="0" x2="3" y2="0"/></g>
    <g transform="translate(17,175)"><line x1="-4" y1="-6" x2="4" y2="-6"/><line x1="0" y1="-6" x2="0" y2="6"/><line x1="-2" y1="6" x2="2" y2="6"/></g>
    <g transform="translate(17,205)"><polyline points="-3,-6 0,-1 3,-6"/><polyline points="-3,1 0,6 3,1"/></g>
  </g>

  <!-- RUNE SYMBOLS — right edge -->
  <g filter="url(#rg)" stroke="#5060c8" stroke-width="1.1" fill="none">
    <g transform="translate(117,65)"><line x1="0" y1="-6" x2="0" y2="6"/><line x1="-4" y1="-2" x2="4" y2="-2"/><line x1="-3" y1="3" x2="3" y2="3"/></g>
    <g transform="translate(117,120)"><polyline points="3,-6 0,6 -3,-6"/><line x1="-3" y1="0" x2="3" y2="0"/></g>
    <g transform="translate(117,175)"><line x1="-4" y1="-6" x2="4" y2="-6"/><line x1="0" y1="-6" x2="0" y2="6"/><line x1="-2" y1="6" x2="2" y2="6"/></g>
    <g transform="translate(117,205)"><polyline points="-3,-6 0,-1 3,-6"/><polyline points="-3,1 0,6 3,1"/></g>
  </g>

  <!-- Separator lines -->
  <rect x="12" y="55"  width="110" height="1" fill="url(#acH)" opacity="0.5"/>
  <rect x="12" y="215" width="110" height="1" fill="url(#acH)" opacity="0.5"/>
</svg>
