<svg xmlns="http://www.w3.org/2000/svg" width="400" height="600" viewBox="0 0 400 600">
  <defs>
    <linearGradient id="logBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#060c18" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0a1020" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="logFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#060c18" stop-opacity="0.95"/>
      <stop offset="20%" stop-color="#060c18" stop-opacity="0"/>
      <stop offset="80%" stop-color="#060c18" stop-opacity="0"/>
      <stop offset="100%" stop-color="#060c18" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="logEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2060b0" stop-opacity="0"/>
      <stop offset="20%" stop-color="#2060b0" stop-opacity="0.5"/>
      <stop offset="80%" stop-color="#2060b0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#2060b0" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect x="6" y="6" width="388" height="588" rx="10" fill="url(#logBg)"/>
  <!-- 上下淡出遮罩 -->
  <rect x="6" y="6" width="388" height="588" rx="10" fill="url(#logFade)"/>

  <!-- 左边框发光线 -->
  <rect x="6" y="6" width="2" height="588" fill="url(#logEdge)" opacity="0.8"/>
  <!-- 右边框 -->
  <rect x="392" y="6" width="2" height="588" fill="url(#logEdge)" opacity="0.4"/>

  <!-- 顶部框线 -->
  <rect x="6" y="6" width="388" height="588" rx="10" fill="none" stroke="#1a3a60" stroke-width="1" opacity="0.6"/>

  <!-- 行分隔线示意（滚动区内） -->
  <g stroke="#0e2040" stroke-width="0.5" opacity="0.5">
    <line x1="16" y1="56" x2="384" y2="56"/>
    <line x1="16" y1="92" x2="384" y2="92"/>
    <line x1="16" y1="128" x2="384" y2="128"/>
    <line x1="16" y1="164" x2="384" y2="164"/>
    <line x1="16" y1="200" x2="384" y2="200"/>
    <line x1="16" y1="236" x2="384" y2="236"/>
    <line x1="16" y1="272" x2="384" y2="272"/>
    <line x1="16" y1="308" x2="384" y2="308"/>
    <line x1="16" y1="344" x2="384" y2="344"/>
    <line x1="16" y1="380" x2="384" y2="380"/>
    <line x1="16" y1="416" x2="384" y2="416"/>
    <line x1="16" y1="452" x2="384" y2="452"/>
    <line x1="16" y1="488" x2="384" y2="488"/>
    <line x1="16" y1="524" x2="384" y2="524"/>
    <line x1="16" y1="560" x2="384" y2="560"/>
  </g>

  <!-- 滚动条轨道 -->
  <rect x="380" y="20" width="6" height="560" rx="3" fill="#0a1828" stroke="#1a3060" stroke-width="0.5" opacity="0.6"/>
  <!-- 滚动条滑块 -->
  <rect x="381" y="440" width="4" height="80" rx="2" fill="#2060b0" opacity="0.6"/>
</svg>
