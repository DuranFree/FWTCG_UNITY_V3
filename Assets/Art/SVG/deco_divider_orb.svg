<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <defs>
    <radialGradient id="orbCore" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#80c0ff"/>
      <stop offset="50%" stop-color="#2060c0"/>
      <stop offset="100%" stop-color="#0a1030"/>
    </radialGradient>
    <radialGradient id="orbShine" cx="35%" cy="28%" r="35%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 外光晕 -->
  <circle cx="24" cy="24" r="22" fill="none" stroke="#4090d0" stroke-width="1" opacity="0.3" filter="url(#glow)"/>

  <!-- 外环 -->
  <circle cx="24" cy="24" r="20" fill="none" stroke="#2060b0" stroke-width="1.2" opacity="0.6"/>

  <!-- 主球体 -->
  <circle cx="24" cy="24" r="16" fill="url(#orbCore)"/>

  <!-- 高光 -->
  <circle cx="24" cy="24" r="16" fill="url(#orbShine)"/>

  <!-- 内环装饰 -->
  <circle cx="24" cy="24" r="10" fill="none" stroke="#60a0ff" stroke-width="0.5" opacity="0.35"/>

  <!-- 四方小点 -->
  <g fill="#4090d0" opacity="0.6">
    <circle cx="24" cy="5" r="1.5"/>
    <circle cx="24" cy="43" r="1.5"/>
    <circle cx="5" cy="24" r="1.5"/>
    <circle cx="43" cy="24" r="1.5"/>
  </g>
</svg>
