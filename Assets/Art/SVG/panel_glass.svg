<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="glassBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e1e34" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#06101e" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="glassShine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="topLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4090d0" stop-opacity="0"/>
      <stop offset="20%" stop-color="#4090d0" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#60b0ff" stop-opacity="1"/>
      <stop offset="80%" stop-color="#4090d0" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#4090d0" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="botLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2060b0" stop-opacity="0"/>
      <stop offset="30%" stop-color="#2060b0" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#4080d0" stop-opacity="0.7"/>
      <stop offset="70%" stop-color="#2060b0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#2060b0" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- 9-slice 边距：16px 四边 -->
  </defs>

  <!-- 主体（毛玻璃底板） -->
  <rect x="10" y="10" width="580" height="380" rx="14" fill="url(#glassBg)"/>
  <!-- 高光层（模拟毛玻璃反光） -->
  <rect x="10" y="10" width="580" height="180" rx="14" fill="url(#glassShine)"/>

  <!-- 外框 -->
  <rect x="10" y="10" width="580" height="380" rx="14" fill="none" stroke="#2060b0" stroke-width="1.5" opacity="0.75"/>
  <!-- 内框 -->
  <rect x="14" y="14" width="572" height="372" rx="11" fill="none" stroke="#4090d0" stroke-width="0.5" opacity="0.25"/>

  <!-- 顶部发光线 -->
  <rect x="10" y="10" width="580" height="2" rx="1" fill="url(#topLine)" filter="url(#glow)"/>
  <!-- 底部线 -->
  <rect x="10" y="388" width="580" height="1.5" rx="0.75" fill="url(#botLine)"/>

  <!-- 四角 L 形装饰 -->
  <g fill="none" stroke="#4090d0" stroke-width="1.5" opacity="0.8" filter="url(#glow)">
    <path d="M22,32 L22,18 L36,18"/>
    <path d="M578,32 L578,18 L564,18"/>
    <path d="M22,368 L22,382 L36,382"/>
    <path d="M578,368 L578,382 L564,382"/>
  </g>

  <!-- 顶部标题区分隔线 -->
  <line x1="30" y1="60" x2="570" y2="60" stroke="#2060b0" stroke-width="0.8" opacity="0.5"/>
  <circle cx="300" cy="60" r="3" fill="#4090d0" opacity="0.6"/>

  <!-- 底部按钮区分隔线 -->
  <line x1="30" y1="340" x2="570" y2="340" stroke="#1a4080" stroke-width="0.8" opacity="0.4"/>

  <!-- 侧边微光竖线 -->
  <line x1="10" y1="30" x2="10" y2="370" stroke="#2060b0" stroke-width="0.5" opacity="0.3"/>
  <line x1="590" y1="30" x2="590" y2="370" stroke="#2060b0" stroke-width="0.5" opacity="0.3"/>
</svg>
