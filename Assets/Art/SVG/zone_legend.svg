<svg xmlns="http://www.w3.org/2000/svg" width="134" height="270" viewBox="0 0 134 270">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#100c1e"/>
      <stop offset="100%" stop-color="#08081a"/>
    </linearGradient>
    <linearGradient id="bH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#4a2e04"/>
      <stop offset="30%" stop-color="#d49010"/>
      <stop offset="50%" stop-color="#f0c030"/>
      <stop offset="70%" stop-color="#d49010"/>
      <stop offset="100%" stop-color="#4a2e04"/>
    </linearGradient>
    <linearGradient id="bV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#4a2e04"/>
      <stop offset="30%" stop-color="#d49010"/>
      <stop offset="50%" stop-color="#f0c030"/>
      <stop offset="70%" stop-color="#d49010"/>
      <stop offset="100%" stop-color="#4a2e04"/>
    </linearGradient>
    <radialGradient id="aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#2a1050" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#08081a" stop-opacity="0"/>
    </radialGradient>
    <filter id="g"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="134" height="270" fill="url(#bg)"/>
  <ellipse cx="67" cy="135" rx="60" ry="125" fill="url(#aura)"/>
  <!-- Diagonals -->
  <g stroke="#18102a" stroke-width="0.7" opacity="0.3">
    <line x1="0" y1="0" x2="134" y2="270"/>
    <line x1="0" y1="135" x2="67" y2="270"/>
    <line x1="67" y1="0" x2="134" y2="135"/>
    <line x1="134" y1="0" x2="0" y2="270"/>
    <line x1="67" y1="0" x2="0" y2="100"/>
    <line x1="134" y1="135" x2="34" y2="270"/>
  </g>
  <!-- Gold bars -->
  <rect x="0" y="0" width="134" height="7" fill="url(#bH)"/>
  <rect x="0" y="263" width="134" height="7" fill="url(#bH)"/>
  <rect x="0" y="0" width="7" height="270" fill="url(#bV)"/>
  <rect x="127" y="0" width="7" height="270" fill="url(#bV)"/>
  <!-- Inner border -->
  <rect x="10" y="10" width="114" height="250" rx="1" fill="none" stroke="#a07010" stroke-width="1.2" opacity="0.7"/>
  <rect x="14" y="14" width="106" height="242" rx="1" fill="none" stroke="#d49010" stroke-width="0.5" opacity="0.3"/>
  <!-- Corner L-brackets (gold, wider) -->
  <g stroke="#f0c030" stroke-width="2.5" fill="none" filter="url(#g)">
    <path d="M10,34 L10,10 L34,10"/>
    <path d="M100,10 L124,10 L124,34"/>
    <path d="M10,236 L10,260 L34,260"/>
    <path d="M100,260 L124,260 L124,236"/>
  </g>
  <g fill="#f0c030" filter="url(#g)">
    <rect x="8" y="8" width="5" height="5"/>
    <rect x="121" y="8" width="5" height="5"/>
    <rect x="8" y="257" width="5" height="5"/>
    <rect x="121" y="257" width="5" height="5"/>
  </g>
  <!-- Separators -->
  <rect x="14" y="56" width="106" height="2" fill="url(#bH)" opacity="0.6"/>
  <rect x="14" y="214" width="106" height="2" fill="url(#bH)" opacity="0.6"/>
  <!-- Legend header fill -->
  <rect x="10" y="10" width="114" height="46" fill="#1a0e30" opacity="0.35"/>
</svg>
