<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <radialGradient id="sigilBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a3060" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1a3060" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a0ff"/>
      <stop offset="50%" stop-color="#2060c0"/>
      <stop offset="100%" stop-color="#60a0ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 背景微光 -->
  <circle cx="128" cy="128" r="120" fill="url(#sigilBg)"/>

  <!-- 外环（粗） -->
  <circle cx="128" cy="128" r="118" fill="none" stroke="#1a3a60" stroke-width="1" opacity="0.5"/>
  <!-- 主光环 -->
  <circle cx="128" cy="128" r="112" fill="none" stroke="url(#ringGrad)" stroke-width="2.5" opacity="0.85" filter="url(#glow)"/>
  <!-- 内装饰环 -->
  <circle cx="128" cy="128" r="105" fill="none" stroke="#2050a0" stroke-width="0.8" opacity="0.4"/>
  <circle cx="128" cy="128" r="96" fill="none" stroke="#1a3a70" stroke-width="0.5" stroke-dasharray="6,4" opacity="0.4"/>

  <!-- 8个刻度点 -->
  <g fill="#4090d0" opacity="0.8" filter="url(#glow)">
    <circle cx="128" cy="16" r="3"/>
    <circle cx="218" cy="38" r="3"/>
    <circle cx="240" cy="128" r="3"/>
    <circle cx="218" cy="218" r="3"/>
    <circle cx="128" cy="240" r="3"/>
    <circle cx="38" cy="218" r="3"/>
    <circle cx="16" cy="128" r="3"/>
    <circle cx="38" cy="38" r="3"/>
  </g>

  <!-- 内部徽印线条（星形符文） -->
  <g stroke="#2060b0" stroke-width="0.8" opacity="0.5" fill="none">
    <!-- 六芒星 -->
    <polygon points="128,48 148,88 188,88 162,112 172,152 128,132 84,152 94,112 68,88 108,88"/>
    <!-- 内圆 -->
    <circle cx="128" cy="128" r="36"/>
  </g>

  <!-- 中心圆 -->
  <circle cx="128" cy="128" r="20" fill="none" stroke="#3070c0" stroke-width="1.2" opacity="0.6"/>
  <circle cx="128" cy="128" r="8" fill="#1a4080" stroke="#4090d0" stroke-width="0.8" opacity="0.7"/>

  <!-- 4个方向短刻度线 -->
  <g stroke="#4090d0" stroke-width="1.5" opacity="0.6">
    <line x1="128" y1="12" x2="128" y2="22"/>
    <line x1="128" y1="234" x2="128" y2="244"/>
    <line x1="12" y1="128" x2="22" y2="128"/>
    <line x1="234" y1="128" x2="244" y2="128"/>
  </g>
</svg>
