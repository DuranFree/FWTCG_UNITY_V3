<svg xmlns="http://www.w3.org/2000/svg" width="200" height="100" viewBox="0 0 200 100">
  <defs>
    <linearGradient id="scoreBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e1e34"/>
      <stop offset="100%" stop-color="#060c18"/>
    </linearGradient>
    <linearGradient id="scoreEdge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c8a020" stop-opacity="0"/>
      <stop offset="30%" stop-color="#c8a020" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#e8c840" stop-opacity="1"/>
      <stop offset="70%" stop-color="#c8a020" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#c8a020" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 主框 -->
  <rect x="6" y="6" width="188" height="88" rx="8" fill="url(#scoreBg)" opacity="0.92"/>
  <rect x="6" y="6" width="188" height="88" rx="8" fill="none" stroke="#c8a020" stroke-width="1.5" opacity="0.75"/>
  <rect x="9" y="9" width="182" height="82" rx="6" fill="none" stroke="#e8c840" stroke-width="0.5" opacity="0.25"/>

  <!-- 顶部金色发光线 -->
  <rect x="6" y="6" width="188" height="2" rx="1" fill="url(#scoreEdge)" filter="url(#glow)"/>

  <!-- 中间斜线分隔（X/8） -->
  <line x1="88" y1="18" x2="112" y2="82" stroke="#c8a020" stroke-width="1.5" opacity="0.6"/>

  <!-- 左右数字区背景 -->
  <rect x="14" y="16" width="68" height="68" rx="4" fill="#060f1e" opacity="0.5"/>
  <rect x="118" y="16" width="68" height="68" rx="4" fill="#060f1e" opacity="0.5"/>

  <!-- 四角装饰 -->
  <g fill="none" stroke="#c8a020" stroke-width="1" opacity="0.6" filter="url(#glow)">
    <path d="M14,20 L14,12 L22,12"/>
    <path d="M186,20 L186,12 L178,12"/>
    <path d="M14,80 L14,88 L22,88"/>
    <path d="M186,80 L186,88 L178,88"/>
  </g>
</svg>
