<svg xmlns="http://www.w3.org/2000/svg" width="480" height="72" viewBox="0 0 480 72">
  <defs>
    <linearGradient id="toastBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#060c18" stop-opacity="0"/>
      <stop offset="10%" stop-color="#0a1828" stop-opacity="0.92"/>
      <stop offset="90%" stop-color="#0a1828" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#060c18" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="toastLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4090d0" stop-opacity="0"/>
      <stop offset="20%" stop-color="#4090d0" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#60b0ff" stop-opacity="1"/>
      <stop offset="80%" stop-color="#4090d0" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4090d0" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 底板 -->
  <rect x="0" y="6" width="480" height="60" rx="6" fill="url(#toastBg)"/>
  <!-- 顶部发光线 -->
  <rect x="0" y="6" width="480" height="1.5" fill="url(#toastLine)" filter="url(#glow)"/>
  <!-- 底部细线 -->
  <rect x="20" y="65" width="440" height="1" fill="#2060b0" opacity="0.3"/>

  <!-- 左侧竖色条（类型提示） -->
  <rect x="8" y="12" width="3" height="48" rx="1.5" fill="#4090d0" opacity="0.8" filter="url(#glow)"/>

  <!-- 左侧小图标区 -->
  <circle cx="30" cy="36" r="12" fill="#060f1e" stroke="#2060b0" stroke-width="1" opacity="0.7"/>
  <circle cx="30" cy="36" r="7" fill="none" stroke="#4090d0" stroke-width="0.8" opacity="0.5"/>
</svg>
