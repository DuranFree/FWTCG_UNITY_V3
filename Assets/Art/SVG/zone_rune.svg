<svg xmlns="http://www.w3.org/2000/svg" width="749" height="130" viewBox="0 0 749 130">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#0e0a1c"/>
      <stop offset="100%" stop-color="#08061a"/>
    </linearGradient>
    <linearGradient id="bvH" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#d0a038" stop-opacity="0.65"/>
      <stop offset="25%" stop-color="#9a6018"/>
      <stop offset="70%" stop-color="#5e3408"/>
      <stop offset="100%" stop-color="#281000"/>
    </linearGradient>
    <linearGradient id="bvV" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#d0a038" stop-opacity="0.65"/>
      <stop offset="25%" stop-color="#9a6018"/>
      <stop offset="70%" stop-color="#5e3408"/>
      <stop offset="100%" stop-color="#281000"/>
    </linearGradient>
    <linearGradient id="acH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#b07818" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#d09828" stop-opacity="0.65"/>
      <stop offset="50%"  stop-color="#ecc848" stop-opacity="0.85"/>
      <stop offset="80%"  stop-color="#d09828" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#b07818" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="runeAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#2a0e6a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#08061a" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dp" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse">
      <path d="M9,0 L18,9 L9,18 L0,9 Z" fill="none" stroke="#180a2e" stroke-width="0.45"/>
    </pattern>
    <filter id="gg" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="rg" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="rgs" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="749" height="130" fill="url(#bg)"/>
  <rect width="749" height="130" fill="url(#runeAura)"/>
  <rect width="749" height="130" fill="url(#dp)" opacity="0.14"/>

  <!-- BORDER shadow -->
  <rect x="0"   y="0"   width="749" height="6" fill="#1a0800"/>
  <rect x="0"   y="124" width="749" height="6" fill="#1a0800"/>
  <rect x="0"   y="0"   width="6"   height="130" fill="#1a0800"/>
  <rect x="743" y="0"   width="6"   height="130" fill="#1a0800"/>
  <!-- BORDER bevel -->
  <rect x="0"   y="0"   width="749" height="4" fill="url(#bvH)"/>
  <rect x="0"   y="126" width="749" height="4" fill="url(#bvH)"/>
  <rect x="0"   y="0"   width="4"   height="130" fill="url(#bvV)"/>
  <rect x="745" y="0"   width="4"   height="130" fill="url(#bvV)"/>

  <!-- INNER BORDERS -->
  <rect x="8"  y="8"  width="733" height="114" fill="none" stroke="#5a3808" stroke-width="1" opacity="0.8"/>
  <rect x="11" y="11" width="727" height="108" fill="none" stroke="#906015" stroke-width="0.5" opacity="0.4"/>
  <rect x="8" y="8"   width="733" height="1" fill="url(#acH)" opacity="0.55"/>
  <rect x="8" y="121" width="733" height="1" fill="url(#acH)" opacity="0.55"/>

  <!-- ===== CORNER MEDALLIONS (r=24) ===== -->
  <!-- TL (8,8) -->
  <g filter="url(#gg)">
    <g stroke="#3a2008" stroke-width="0.6" opacity="0.5">
      <line x1="8" y1="8" x2="32" y2="8"/>
      <line x1="8" y1="8" x2="30" y2="14"/>
      <line x1="8" y1="8" x2="25" y2="25"/>
      <line x1="8" y1="8" x2="14" y2="30"/>
      <line x1="8" y1="8" x2="8"  y2="32"/>
    </g>
    <path d="M 8,32 A 24,24 0 0 1 32,8" fill="none" stroke="#9a6018" stroke-width="1.6"/>
    <path d="M 8,24 A 16,16 0 0 1 24,8" fill="none" stroke="#c08822" stroke-width="0.9" opacity="0.55"/>
    <g stroke="#cca030" stroke-width="1" opacity="0.9">
      <line x1="8"  y1="32" x2="11" y2="27"/>
      <line x1="25" y1="25" x2="28" y2="20"/>
      <line x1="32" y1="8"  x2="27" y2="11"/>
    </g>
    <rect x="6" y="6" width="4" height="4" fill="#e0b840"/>
  </g>
  <!-- TR (741,8) -->
  <g filter="url(#gg)">
    <g stroke="#3a2008" stroke-width="0.6" opacity="0.5">
      <line x1="741" y1="8" x2="717" y2="8"/>
      <line x1="741" y1="8" x2="719" y2="14"/>
      <line x1="741" y1="8" x2="724" y2="25"/>
      <line x1="741" y1="8" x2="727" y2="30"/>
      <line x1="741" y1="8" x2="741" y2="32"/>
    </g>
    <path d="M 717,8 A 24,24 0 0 1 741,32" fill="none" stroke="#9a6018" stroke-width="1.6"/>
    <path d="M 725,8 A 16,16 0 0 1 741,24" fill="none" stroke="#c08822" stroke-width="0.9" opacity="0.55"/>
    <g stroke="#cca030" stroke-width="1" opacity="0.9">
      <line x1="717" y1="8"  x2="722" y2="11"/>
      <line x1="724" y1="25" x2="728" y2="20"/>
      <line x1="741" y1="32" x2="738" y2="27"/>
    </g>
    <rect x="739" y="6" width="4" height="4" fill="#e0b840"/>
  </g>
  <!-- BL (8,122) -->
  <g filter="url(#gg)">
    <g stroke="#3a2008" stroke-width="0.6" opacity="0.5">
      <line x1="8" y1="122" x2="32"  y2="122"/>
      <line x1="8" y1="122" x2="30"  y2="116"/>
      <line x1="8" y1="122" x2="25"  y2="105"/>
      <line x1="8" y1="122" x2="14"  y2="100"/>
      <line x1="8" y1="122" x2="8"   y2="98"/>
    </g>
    <path d="M 32,122 A 24,24 0 0 0 8,98" fill="none" stroke="#9a6018" stroke-width="1.6"/>
    <path d="M 24,122 A 16,16 0 0 0 8,106" fill="none" stroke="#c08822" stroke-width="0.9" opacity="0.55"/>
    <g stroke="#cca030" stroke-width="1" opacity="0.9">
      <line x1="32" y1="122" x2="29" y2="117"/>
      <line x1="8"  y1="98"  x2="11" y2="103"/>
    </g>
    <rect x="6" y="120" width="4" height="4" fill="#e0b840"/>
  </g>
  <!-- BR (741,122) -->
  <g filter="url(#gg)">
    <g stroke="#3a2008" stroke-width="0.6" opacity="0.5">
      <line x1="741" y1="122" x2="717" y2="122"/>
      <line x1="741" y1="122" x2="719" y2="116"/>
      <line x1="741" y1="122" x2="724" y2="105"/>
      <line x1="741" y1="122" x2="727" y2="100"/>
      <line x1="741" y1="122" x2="741" y2="98"/>
    </g>
    <path d="M 741,98 A 24,24 0 0 1 717,122" fill="none" stroke="#9a6018" stroke-width="1.6"/>
    <path d="M 741,106 A 16,16 0 0 1 725,122" fill="none" stroke="#c08822" stroke-width="0.9" opacity="0.55"/>
    <g stroke="#cca030" stroke-width="1" opacity="0.9">
      <line x1="741" y1="98"  x2="738" y2="103"/>
      <line x1="717" y1="122" x2="722" y2="117"/>
    </g>
    <rect x="739" y="120" width="4" height="4" fill="#e0b840"/>
  </g>

  <!-- RUNE SLOT DIVIDERS (dashed, purple) -->
  <g stroke="#5028a8" stroke-width="0.9" stroke-dasharray="4,6" opacity="0.55">
    <line x1="196" y1="13" x2="196" y2="117"/>
    <line x1="374" y1="13" x2="374" y2="117"/>
    <line x1="553" y1="13" x2="553" y2="117"/>
  </g>

  <!-- RUNE SLOT GEMS (4 slots: centers at 98, 285, 463, 651) -->
  <!-- Each: outer hex + inner fill + facet lines + center dot, with purple glow -->
  <!-- Slot 1: x=98 -->
  <g filter="url(#rg)" opacity="0.6">
    <polygon points="98,42 110,50 110,68 98,76 86,68 86,50" fill="none" stroke="#6838c0" stroke-width="1.3"/>
    <polygon points="98,48 106,54 106,64 98,70 90,64 90,54" fill="#180840" opacity="0.75"/>
    <line x1="98" y1="42" x2="98" y2="76" stroke="#8050d8" stroke-width="0.7" opacity="0.8"/>
    <line x1="86" y1="50" x2="110" y2="68" stroke="#8050d8" stroke-width="0.7" opacity="0.8"/>
    <line x1="110" y1="50" x2="86" y2="68" stroke="#8050d8" stroke-width="0.7" opacity="0.8"/>
    <circle cx="98" cy="59" r="3" fill="#b070f0"/>
  </g>
  <!-- Slot 2: x=285 -->
  <g filter="url(#rg)" opacity="0.6">
    <polygon points="285,42 297,50 297,68 285,76 273,68 273,50" fill="none" stroke="#6838c0" stroke-width="1.3"/>
    <polygon points="285,48 293,54 293,64 285,70 277,64 277,54" fill="#180840" opacity="0.75"/>
    <line x1="285" y1="42" x2="285" y2="76" stroke="#8050d8" stroke-width="0.7" opacity="0.8"/>
    <line x1="273" y1="50" x2="297" y2="68" stroke="#8050d8" stroke-width="0.7" opacity="0.8"/>
    <line x1="297" y1="50" x2="273" y2="68" stroke="#8050d8" stroke-width="0.7" opacity="0.8"/>
    <circle cx="285" cy="59" r="3" fill="#b070f0"/>
  </g>
  <!-- Slot 3: x=463 -->
  <g filter="url(#rg)" opacity="0.6">
    <polygon points="463,42 475,50 475,68 463,76 451,68 451,50" fill="none" stroke="#6838c0" stroke-width="1.3"/>
    <polygon points="463,48 471,54 471,64 463,70 455,64 455,54" fill="#180840" opacity="0.75"/>
    <line x1="463" y1="42" x2="463" y2="76" stroke="#8050d8" stroke-width="0.7" opacity="0.8"/>
    <line x1="451" y1="50" x2="475" y2="68" stroke="#8050d8" stroke-width="0.7" opacity="0.8"/>
    <line x1="475" y1="50" x2="451" y2="68" stroke="#8050d8" stroke-width="0.7" opacity="0.8"/>
    <circle cx="463" cy="59" r="3" fill="#b070f0"/>
  </g>
  <!-- Slot 4: x=651 -->
  <g filter="url(#rg)" opacity="0.6">
    <polygon points="651,42 663,50 663,68 651,76 639,68 639,50" fill="none" stroke="#6838c0" stroke-width="1.3"/>
    <polygon points="651,48 659,54 659,64 651,70 643,64 643,54" fill="#180840" opacity="0.75"/>
    <line x1="651" y1="42" x2="651" y2="76" stroke="#8050d8" stroke-width="0.7" opacity="0.8"/>
    <line x1="639" y1="50" x2="663" y2="68" stroke="#8050d8" stroke-width="0.7" opacity="0.8"/>
    <line x1="663" y1="50" x2="639" y2="68" stroke="#8050d8" stroke-width="0.7" opacity="0.8"/>
    <circle cx="651" cy="59" r="3" fill="#b070f0"/>
  </g>

  <!-- Rune label glyphs (small, above each gem) -->
  <g filter="url(#rgs)" stroke="#7848d0" stroke-width="1" fill="none" opacity="0.75">
    <g transform="translate(98,30)"><polyline points="-4,-5 0,5 4,-5"/><line x1="-3" y1="0" x2="3" y2="0"/></g>
    <g transform="translate(285,30)"><line x1="0" y1="-5" x2="0" y2="5"/><line x1="-4" y1="-1" x2="4" y2="-1"/><line x1="-3" y1="3" x2="3" y2="3"/></g>
    <g transform="translate(463,30)"><line x1="-4" y1="-5" x2="4" y2="-5"/><line x1="0" y1="-5" x2="0" y2="5"/><line x1="-3" y1="5" x2="3" y2="5"/></g>
    <g transform="translate(651,30)"><polyline points="-4,-5 0,0 4,-5"/><polyline points="-4,1 0,6 4,1"/></g>
  </g>
</svg>
