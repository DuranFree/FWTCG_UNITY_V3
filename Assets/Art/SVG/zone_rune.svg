<svg xmlns="http://www.w3.org/2000/svg" width="749" height="130" viewBox="0 0 749 130">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#0e0a1c"/>
      <stop offset="100%" stop-color="#080614"/>
    </linearGradient>
    <linearGradient id="bronzeH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#3a2008"/>
      <stop offset="20%" stop-color="#c88828"/>
      <stop offset="50%" stop-color="#e8b030"/>
      <stop offset="80%" stop-color="#c88828"/>
      <stop offset="100%" stop-color="#3a2008"/>
    </linearGradient>
    <linearGradient id="bronzeV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#3a2008"/>
      <stop offset="30%" stop-color="#c88828"/>
      <stop offset="50%" stop-color="#e8b030"/>
      <stop offset="70%" stop-color="#c88828"/>
      <stop offset="100%" stop-color="#3a2008"/>
    </linearGradient>
    <radialGradient id="runeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#3010a0" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#080614" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="749" height="130" fill="url(#bg)"/>
  <rect width="749" height="130" fill="url(#runeGlow)"/>

  <!-- Subtle diagonals -->
  <g stroke="#18082a" stroke-width="0.7" opacity="0.3">
    <line x1="0" y1="0" x2="749" y2="130"/>
    <line x1="0" y1="65" x2="684" y2="130"/>
    <line x1="65" y1="0" x2="749" y2="65"/>
    <line x1="749" y1="0" x2="0" y2="130"/>
  </g>

  <!-- Bronze bars -->
  <rect x="0" y="0" width="749" height="6" fill="url(#bronzeH)"/>
  <rect x="0" y="124" width="749" height="6" fill="url(#bronzeH)"/>
  <rect x="0" y="0" width="6" height="130" fill="url(#bronzeV)"/>
  <rect x="743" y="0" width="6" height="130" fill="url(#bronzeV)"/>

  <!-- Inner border -->
  <rect x="9" y="9" width="731" height="112" rx="1" fill="none" stroke="#8a5c18" stroke-width="1" opacity="0.7"/>
  <rect x="12" y="12" width="725" height="106" rx="1" fill="none" stroke="#c88828" stroke-width="0.5" opacity="0.3"/>

  <!-- Corner L-brackets -->
  <g stroke="#e8b030" stroke-width="2" fill="none" filter="url(#glow)">
    <path d="M9,30 L9,9 L30,9"/>
    <path d="M719,9 L740,9 L740,30"/>
    <path d="M9,100 L9,121 L30,121"/>
    <path d="M719,121 L740,121 L740,100"/>
  </g>
  <g fill="#e8b030" filter="url(#glow)">
    <rect x="7" y="7" width="4" height="4"/>
    <rect x="738" y="7" width="4" height="4"/>
    <rect x="7" y="119" width="4" height="4"/>
    <rect x="738" y="119" width="4" height="4"/>
  </g>

  <!-- Rune slot dividers (4 slots -> 3 dividers) -->
  <g stroke="#4020a0" stroke-width="0.8" stroke-dasharray="4,6" opacity="0.5">
    <line x1="196" y1="14" x2="196" y2="116"/>
    <line x1="374" y1="14" x2="374" y2="116"/>
    <line x1="553" y1="14" x2="553" y2="116"/>
  </g>

  <!-- Rune slot diamonds (centered in each of 4 slots: 98, 285, 463, 651) -->
  <g fill="none" stroke="#7030d0" stroke-width="1" opacity="0.5" filter="url(#glow)">
    <polygon points="98,48 110,60 98,72 86,60"/>
    <polygon points="285,48 297,60 285,72 273,60"/>
    <polygon points="463,48 475,60 463,72 451,60"/>
    <polygon points="651,48 663,60 651,72 639,60"/>
  </g>
  <!-- Inner fill diamonds -->
  <g fill="#3010a0" opacity="0.3">
    <polygon points="98,53 106,60 98,67 90,60"/>
    <polygon points="285,53 293,60 285,67 277,60"/>
    <polygon points="463,53 471,60 463,67 455,60"/>
    <polygon points="651,53 659,60 651,67 643,60"/>
  </g>
</svg>
