<svg xmlns="http://www.w3.org/2000/svg" width="160" height="400" viewBox="0 0 160 400">
  <defs>
    <linearGradient id="runeBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0a1828"/>
      <stop offset="100%" stop-color="#060f1e"/>
    </linearGradient>
    <radialGradient id="runeSlotOn" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#60a0ff" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#2060c0" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#2060c0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="runeSlotOff" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a2a40" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0a1020" stop-opacity="0.3"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 主容器 -->
  <rect x="6" y="6" width="148" height="388" rx="12" fill="url(#runeBg)" opacity="0.85"/>
  <rect x="6" y="6" width="148" height="388" rx="12" fill="none" stroke="#2050a0" stroke-width="1.5" opacity="0.6"/>
  <rect x="9" y="9" width="142" height="382" rx="10" fill="none" stroke="#3070c0" stroke-width="0.5" opacity="0.2"/>

  <!-- 8个符文槽（圆形） -->
  <!-- 槽1 -->
  <circle cx="80" cy="46" r="22" fill="url(#runeSlotOn)" stroke="#4080d0" stroke-width="1.5" opacity="0.9"/>
  <circle cx="80" cy="46" r="16" fill="none" stroke="#60a0ff" stroke-width="0.8" opacity="0.5"/>
  <circle cx="80" cy="46" r="8" fill="#3070c0" opacity="0.4" filter="url(#glow)"/>

  <!-- 槽2 -->
  <circle cx="80" cy="96" r="22" fill="url(#runeSlotOn)" stroke="#4080d0" stroke-width="1.5" opacity="0.9"/>
  <circle cx="80" cy="96" r="16" fill="none" stroke="#60a0ff" stroke-width="0.8" opacity="0.5"/>
  <circle cx="80" cy="96" r="8" fill="#3070c0" opacity="0.4" filter="url(#glow)"/>

  <!-- 槽3 -->
  <circle cx="80" cy="146" r="22" fill="url(#runeSlotOn)" stroke="#4080d0" stroke-width="1.5" opacity="0.9"/>
  <circle cx="80" cy="146" r="16" fill="none" stroke="#60a0ff" stroke-width="0.8" opacity="0.5"/>
  <circle cx="80" cy="146" r="8" fill="#3070c0" opacity="0.4" filter="url(#glow)"/>

  <!-- 槽4 -->
  <circle cx="80" cy="196" r="22" fill="url(#runeSlotOn)" stroke="#4080d0" stroke-width="1.5" opacity="0.9"/>
  <circle cx="80" cy="196" r="16" fill="none" stroke="#60a0ff" stroke-width="0.8" opacity="0.5"/>
  <circle cx="80" cy="196" r="8" fill="#3070c0" opacity="0.4" filter="url(#glow)"/>

  <!-- 槽5（空/暗） -->
  <circle cx="80" cy="246" r="22" fill="url(#runeSlotOff)" stroke="#1a3060" stroke-width="1.2" opacity="0.7"/>
  <circle cx="80" cy="246" r="16" fill="none" stroke="#2050a0" stroke-width="0.5" opacity="0.3"/>

  <!-- 槽6（空） -->
  <circle cx="80" cy="296" r="22" fill="url(#runeSlotOff)" stroke="#1a3060" stroke-width="1.2" opacity="0.7"/>
  <circle cx="80" cy="296" r="16" fill="none" stroke="#2050a0" stroke-width="0.5" opacity="0.3"/>

  <!-- 槽7（空） -->
  <circle cx="80" cy="346" r="22" fill="url(#runeSlotOff)" stroke="#1a3060" stroke-width="1.2" opacity="0.7"/>
  <circle cx="80" cy="346" r="16" fill="none" stroke="#2050a0" stroke-width="0.5" opacity="0.3"/>

  <!-- 槽8（空） -->
  <circle cx="80" cy="382" r="16" fill="url(#runeSlotOff)" stroke="#1a3060" stroke-width="1" opacity="0.5"/>

  <!-- 槽间连接线 -->
  <g stroke="#1a3a60" stroke-width="0.8" opacity="0.4">
    <line x1="80" y1="68" x2="80" y2="74"/>
    <line x1="80" y1="118" x2="80" y2="124"/>
    <line x1="80" y1="168" x2="80" y2="174"/>
    <line x1="80" y1="218" x2="80" y2="224"/>
    <line x1="80" y1="268" x2="80" y2="274"/>
    <line x1="80" y1="318" x2="80" y2="324"/>
    <line x1="80" y1="362" x2="80" y2="366"/>
  </g>

  <!-- 四角装饰 -->
  <g fill="none" stroke="#3070c0" stroke-width="1" opacity="0.5">
    <path d="M14,20 L14,12 L22,12"/>
    <path d="M146,20 L146,12 L138,12"/>
    <path d="M14,380 L14,388 L22,388"/>
    <path d="M146,380 L146,388 L138,388"/>
  </g>
</svg>
