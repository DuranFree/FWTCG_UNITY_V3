<svg xmlns="http://www.w3.org/2000/svg" width="160" height="60" viewBox="0 0 160 60">
  <defs>
    <linearGradient id="confirmBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#102040"/>
      <stop offset="100%" stop-color="#060f20"/>
    </linearGradient>
    <linearGradient id="confirmEdge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2060d0" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#4090ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#2060d0" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="confirmShine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a0ff" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#60a0ff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
