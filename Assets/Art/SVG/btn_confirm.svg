  <rect x="9" y="8" width="142" height="44" rx="4" fill="none" stroke="#4090ff" stroke-width="0.5" opacity="0.3"/>
  <rect x="6" y="5" width="148" height="2" rx="1" fill="url(#confirmEdge)" opacity="0.9" filter="url(#glow)"/>
  <g fill="none" stroke="#4090ff" stroke-width="1" opacity="0.6" filter="url(#glow)">
    <path d="M14,16 L14,9 L21,9"/>
    <path d="M146,16 L146,9 L139,9"/>
