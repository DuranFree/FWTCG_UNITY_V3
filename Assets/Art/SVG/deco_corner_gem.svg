<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="gemCore" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#80c0ff"/>
      <stop offset="40%" stop-color="#2060d0"/>
      <stop offset="100%" stop-color="#0a1840"/>
    </radialGradient>
    <radialGradient id="gemShine" cx="35%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 宝石主体（六边形切割感） -->
  <polygon points="32,4 52,16 56,36 44,56 20,56 8,36 12,16"
    fill="url(#gemCore)" stroke="#4090d0" stroke-width="1" opacity="0.95"/>

  <!-- 切割线 -->
  <line x1="32" y1="4" x2="32" y2="56" stroke="#60a0ff" stroke-width="0.5" opacity="0.3"/>
  <line x1="8" y1="36" x2="56" y2="36" stroke="#60a0ff" stroke-width="0.5" opacity="0.25"/>
  <line x1="12" y1="16" x2="44" y2="56" stroke="#60a0ff" stroke-width="0.5" opacity="0.2"/>
  <line x1="52" y1="16" x2="20" y2="56" stroke="#60a0ff" stroke-width="0.5" opacity="0.2"/>

  <!-- 高光 -->
  <polygon points="32,4 52,16 56,36 44,56 20,56 8,36 12,16"
    fill="url(#gemShine)"/>

  <!-- 外发光 -->
  <polygon points="32,4 52,16 56,36 44,56 20,56 8,36 12,16"
    fill="none" stroke="#60b0ff" stroke-width="1.5" opacity="0.5" filter="url(#glow)"/>
</svg>
