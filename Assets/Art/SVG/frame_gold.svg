<svg xmlns="http://www.w3.org/2000/svg" width="400" height="560" viewBox="0 0 400 560">
  <defs>
    <linearGradient id="goldFrame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#f0d060"/>
      <stop offset="25%" stop-color="#c8a020"/>
      <stop offset="50%" stop-color="#f0d060"/>
      <stop offset="75%" stop-color="#a07810"/>
      <stop offset="100%" stop-color="#e8c040"/>
    </linearGradient>
    <linearGradient id="goldInner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#1a1000" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0a0800" stop-opacity="0.85"/>
    </linearGradient>
    <radialGradient id="goldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c8a020" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c8a020" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- 9-slice: 上32 下32 左24 右24 -->
  </defs>

  <!-- 内部底板（透明留给卡图） -->
  <rect x="24" y="32" width="352" height="496" rx="8" fill="url(#goldInner)"/>
  <rect x="24" y="32" width="352" height="496" rx="8" fill="url(#goldGlow)"/>

  <!-- 主框（粗金边，9-slice友好） -->
  <!-- 顶边 -->
  <rect x="20" y="8" width="360" height="28" rx="4" fill="url(#goldFrame)"/>
  <!-- 底边 -->
  <rect x="20" y="524" width="360" height="28" rx="4" fill="url(#goldFrame)"/>
  <!-- 左边 -->
  <rect x="4" y="28" width="24" height="504" rx="4" fill="url(#goldFrame)"/>
  <!-- 右边 -->
  <rect x="372" y="28" width="24" height="504" rx="4" fill="url(#goldFrame)"/>

  <!-- 内框细线 -->
  <rect x="28" y="36" width="344" height="488" rx="6" fill="none" stroke="#e8c840" stroke-width="0.8" opacity="0.35"/>

  <!-- 四角装饰（菱形宝石） -->
  <g filter="url(#glow)">
    <!-- 左上 -->
    <polygon points="20,20 36,8 52,20 36,32" fill="#f0d060" stroke="#a07810" stroke-width="0.8"/>
    <!-- 右上 -->
    <polygon points="348,20 364,8 380,20 364,32" fill="#f0d060" stroke="#a07810" stroke-width="0.8"/>
    <!-- 左下 -->
    <polygon points="20,528 36,516 52,528 36,540" fill="#f0d060" stroke="#a07810" stroke-width="0.8"/>
    <!-- 右下 -->
    <polygon points="348,528 364,516 380,528 364,540" fill="#f0d060" stroke="#a07810" stroke-width="0.8"/>
  </g>

  <!-- 顶部装饰区分隔线（费用/标题） -->
  <rect x="28" y="80" width="344" height="2" rx="1" fill="url(#goldFrame)" opacity="0.6"/>

  <!-- 图像区底部分隔线 -->
  <rect x="28" y="330" width="344" height="2" rx="1" fill="url(#goldFrame)" opacity="0.5"/>

  <!-- 属性区底部分隔线 -->
  <rect x="28" y="420" width="344" height="1.5" rx="0.75" fill="#c8a020" opacity="0.4"/>

  <!-- 顶部中心徽章底座 -->
  <ellipse cx="200" cy="36" rx="28" ry="14" fill="#0a0800" stroke="url(#goldFrame)" stroke-width="1.5" opacity="0.9"/>

  <!-- 底部左右战力框 -->
  <rect x="36" y="524" width="60" height="28" rx="4" fill="#0a0800" stroke="url(#goldFrame)" stroke-width="1.2" opacity="0.9"/>
  <rect x="304" y="524" width="60" height="28" rx="4" fill="#0a0800" stroke="url(#goldFrame)" stroke-width="1.2" opacity="0.9"/>

  <!-- 费用圆角框（左上） -->
  <circle cx="44" cy="52" r="22" fill="#0a0800" stroke="url(#goldFrame)" stroke-width="2" opacity="0.95" filter="url(#glow)"/>
</svg>
