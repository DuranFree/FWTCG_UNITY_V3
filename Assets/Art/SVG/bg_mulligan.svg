<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <radialGradient id="mulBg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#101c30"/>
      <stop offset="100%" stop-color="#060c18"/>
    </radialGradient>
    <linearGradient id="topBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2060b0" stop-opacity="0"/>
      <stop offset="30%" stop-color="#2060b0" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#4090d0" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#2060b0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#2060b0" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>

  <!-- 面板 -->
  <rect x="16" y="16" width="1168" height="668" rx="16" fill="url(#mulBg)"/>

  <!-- 外框 -->
  <rect x="16" y="16" width="1168" height="668" rx="16" fill="none" stroke="#2060b0" stroke-width="2" opacity="0.7"/>
  <rect x="19" y="19" width="1162" height="662" rx="14" fill="none" stroke="#4090d0" stroke-width="0.5" opacity="0.3"/>

  <!-- 顶部高亮条 -->
  <rect x="16" y="16" width="1168" height="3" rx="1" fill="url(#topBar)"/>

  <!-- 四角装饰 -->
  <g fill="none" stroke="#2060b0" stroke-width="1.5" opacity="0.6">
    <path d="M28,48 L28,28 L48,28"/>
    <path d="M1172,48 L1172,28 L1152,28"/>
    <path d="M28,652 L28,672 L48,672"/>
    <path d="M1172,652 L1172,672 L1152,672"/>
  </g>

  <!-- 顶部横向装饰线 -->
  <line x1="80" y1="90" x2="1120" y2="90" stroke="#2060b0" stroke-width="0.5" opacity="0.5"/>
  <circle cx="600" cy="90" r="3" fill="#4090d0" opacity="0.5"/>
  <line x1="560" y1="90" x2="640" y2="90" stroke="#4090d0" stroke-width="1" opacity="0.5"/>

  <!-- 底部横向装饰线 -->
  <line x1="80" y1="610" x2="1120" y2="610" stroke="#2060b0" stroke-width="0.5" opacity="0.5"/>

  <!-- 内部微光 -->
  <ellipse cx="600" cy="350" rx="400" ry="200" fill="#1a4080" opacity="0.06" filter="url(#blur)"/>

  <!-- 星点 -->
  <g fill="#4090d0" opacity="0.25">
    <circle cx="60" cy="140" r="1"/>
    <circle cx="1140" cy="160" r="1"/>
    <circle cx="80" cy="560" r="1"/>
    <circle cx="1120" cy="540" r="1.2"/>
    <circle cx="300" cy="90" r="0.8"/>
    <circle cx="900" cy="610" r="0.8"/>
  </g>
</svg>
