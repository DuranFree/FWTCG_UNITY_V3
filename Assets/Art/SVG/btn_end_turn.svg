<svg xmlns="http://www.w3.org/2000/svg" width="240" height="80" viewBox="0 0 240 80">
  <defs>
    <linearGradient id="btnBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a4a20"/>
      <stop offset="50%" stop-color="#0e3018"/>
      <stop offset="100%" stop-color="#081808"/>
    </linearGradient>
    <linearGradient id="btnEdge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#20c040" stop-opacity="0.3"/>
      <stop offset="40%" stop-color="#30e060" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#30e060" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#20c040" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="btnShine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60ff80" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#60ff80" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 斜切底板（平行四边形感） -->
  <path d="M16,6 L228,6 L224,74 L12,74 Z" fill="url(#btnBg)" opacity="0.95"/>
  <!-- 光泽层 -->
  <path d="M16,6 L228,6 L228,36 L16,38 Z" fill="url(#btnShine)"/>
  <!-- 外框 -->
  <path d="M16,6 L228,6 L224,74 L12,74 Z" fill="none" stroke="#20c040" stroke-width="1.5" opacity="0.8"/>
  <!-- 内框 -->
  <path d="M19,9 L225,9 L221,71 L15,71 Z" fill="none" stroke="#40e060" stroke-width="0.5" opacity="0.3"/>

  <!-- 顶部发光线 -->
  <path d="M16,6 L228,6" stroke="url(#btnEdge)" stroke-width="2" opacity="0.9" filter="url(#glow)"/>

  <!-- 左右侧装饰竖线 -->
  <line x1="12" y1="74" x2="16" y2="6" stroke="#20c040" stroke-width="0.8" opacity="0.4"/>
  <line x1="228" y1="6" x2="224" y2="74" stroke="#20c040" stroke-width="0.8" opacity="0.4"/>

  <!-- 角落小装饰 -->
  <g fill="none" stroke="#40e060" stroke-width="1" opacity="0.6" filter="url(#glow)">
    <path d="M22,18 L22,10 L30,10"/>
    <path d="M218,10 L226,10 L224,18"/>
  </g>
</svg>
