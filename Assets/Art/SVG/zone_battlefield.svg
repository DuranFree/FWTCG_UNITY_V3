<svg xmlns="http://www.w3.org/2000/svg" width="871" height="540" viewBox="0 0 871 540">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#0b1122"/>
      <stop offset="50%" stop-color="#070d1a"/>
      <stop offset="100%" stop-color="#0b1122"/>
    </linearGradient>
    <!-- Bevel: horizontal bar — bright top, dark bottom -->
    <linearGradient id="bvH" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#d8a840" stop-opacity="0.7"/>
      <stop offset="25%" stop-color="#a06820"/>
      <stop offset="70%" stop-color="#6a3e08"/>
      <stop offset="100%" stop-color="#2a1000"/>
    </linearGradient>
    <!-- Bevel: vertical bar -->
    <linearGradient id="bvV" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#d8a840" stop-opacity="0.7"/>
      <stop offset="25%" stop-color="#a06820"/>
      <stop offset="70%" stop-color="#6a3e08"/>
      <stop offset="100%" stop-color="#2a1000"/>
    </linearGradient>
    <!-- Accent glow line (horizontal fade) -->
    <linearGradient id="acH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#b87820" stop-opacity="0"/>
      <stop offset="25%"  stop-color="#d4a030" stop-opacity="0.7"/>
      <stop offset="50%"  stop-color="#f0d060" stop-opacity="0.9"/>
      <stop offset="75%"  stop-color="#d4a030" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#b87820" stop-opacity="0"/>
    </linearGradient>
    <!-- Diamond bg texture -->
    <pattern id="dp" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M10,0 L20,10 L10,20 L0,10 Z" fill="none" stroke="#111a2e" stroke-width="0.5"/>
    </pattern>
    <!-- Glow filters -->
    <filter id="gg" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="rg" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="871" height="540" fill="url(#bg)"/>
  <rect width="871" height="540" fill="url(#dp)" opacity="0.18"/>

  <!-- Center swirl motif (very subtle) -->
  <g opacity="0.08" stroke="#908898" fill="none" stroke-linecap="round">
    <path d="M435,270 m 0,-108 a108,108 0 1,1 -1,0" stroke-width="22"/>
    <path d="M435,270 m 0,-76 a76,76 0 1,1 -1,0" stroke-width="16"/>
    <path d="M435,270 m 0,-48 a48,48 0 1,1 -1,0" stroke-width="10"/>
  </g>
  <!-- Center hextech gem (6-sided) -->
  <g filter="url(#rg)" opacity="0.4">
    <polygon points="435,246 456,257 456,279 435,290 414,279 414,257" fill="none" stroke="#6040b0" stroke-width="1.5"/>
    <polygon points="435,252 451,261 451,275 435,284 419,275 419,261" fill="#15083a" opacity="0.7"/>
    <line x1="435" y1="246" x2="435" y2="290" stroke="#8060d0" stroke-width="0.8" opacity="0.7"/>
    <line x1="414" y1="257" x2="456" y2="279" stroke="#8060d0" stroke-width="0.8" opacity="0.7"/>
    <line x1="456" y1="257" x2="414" y2="279" stroke="#8060d0" stroke-width="0.8" opacity="0.7"/>
    <circle cx="435" cy="268" r="3.5" fill="#b080f0"/>
  </g>

  <!-- BORDER: shadow base -->
  <rect x="0"   y="0"   width="871" height="7"   fill="#1e0c00"/>
  <rect x="0"   y="533" width="871" height="7"   fill="#1e0c00"/>
  <rect x="0"   y="0"   width="7"   height="540" fill="#1e0c00"/>
  <rect x="864" y="0"   width="7"   height="540" fill="#1e0c00"/>
  <!-- BORDER: main bevel bars -->
  <rect x="0"   y="0"   width="871" height="5"   fill="url(#bvH)"/>
  <rect x="0"   y="535" width="871" height="5"   fill="url(#bvH)"/>
  <rect x="0"   y="0"   width="5"   height="540" fill="url(#bvV)"/>
  <rect x="866" y="0"   width="5"   height="540" fill="url(#bvV)"/>

  <!-- INNER BORDERS -->
  <rect x="11" y="11" width="849" height="518" fill="none" stroke="#6a4010" stroke-width="1.2" opacity="0.8"/>
  <rect x="15" y="15" width="841" height="510" fill="none" stroke="#9a6820" stroke-width="0.5" opacity="0.4"/>
  <!-- Inner accent glow lines -->
  <rect x="11" y="11" width="849" height="1" fill="url(#acH)" opacity="0.6"/>
  <rect x="11" y="528" width="849" height="1" fill="url(#acH)" opacity="0.6"/>

  <!-- ===== CORNER MEDALLIONS ===== -->
  <!-- TL: origin (11,11) opening right+down, r=50 -->
  <g filter="url(#gg)">
    <g stroke="#4a2c08" stroke-width="0.6" opacity="0.55">
      <line x1="11" y1="11" x2="61" y2="11"/>
      <line x1="11" y1="11" x2="59" y2="24"/>
      <line x1="11" y1="11" x2="52" y2="36"/>
      <line x1="11" y1="11" x2="46" y2="46"/>
      <line x1="11" y1="11" x2="36" y2="52"/>
      <line x1="11" y1="11" x2="24" y2="59"/>
      <line x1="11" y1="11" x2="11" y2="61"/>
    </g>
    <path d="M 11,61 A 50,50 0 0 1 61,11" fill="none" stroke="#a06820" stroke-width="2"/>
    <path d="M 11,45 A 34,34 0 0 1 45,11" fill="none" stroke="#c8901e" stroke-width="1" opacity="0.6"/>
    <g stroke="#d4a030" stroke-width="1.2" opacity="0.9">
      <line x1="11" y1="61" x2="14" y2="55"/>
      <line x1="24" y1="59" x2="27" y2="53"/>
      <line x1="36" y1="52" x2="39" y2="46"/>
      <line x1="46" y1="46" x2="49" y2="41"/>
      <line x1="52" y1="36" x2="55" y2="30"/>
      <line x1="59" y1="24" x2="62" y2="18"/>
      <line x1="61" y1="11" x2="55" y2="14"/>
    </g>
    <rect x="9" y="9" width="5" height="5" fill="#e8c050"/>
  </g>

  <!-- TR: origin (860,11), r=50 -->
  <g filter="url(#gg)">
    <g stroke="#4a2c08" stroke-width="0.6" opacity="0.55">
      <line x1="860" y1="11" x2="810" y2="11"/>
      <line x1="860" y1="11" x2="812" y2="24"/>
      <line x1="860" y1="11" x2="819" y2="36"/>
      <line x1="860" y1="11" x2="825" y2="46"/>
      <line x1="860" y1="11" x2="835" y2="52"/>
      <line x1="860" y1="11" x2="847" y2="59"/>
      <line x1="860" y1="11" x2="860" y2="61"/>
    </g>
    <path d="M 810,11 A 50,50 0 0 1 860,61" fill="none" stroke="#a06820" stroke-width="2"/>
    <path d="M 826,11 A 34,34 0 0 1 860,45" fill="none" stroke="#c8901e" stroke-width="1" opacity="0.6"/>
    <g stroke="#d4a030" stroke-width="1.2" opacity="0.9">
      <line x1="810" y1="11" x2="816" y2="14"/>
      <line x1="812" y1="24" x2="818" y2="27"/>
      <line x1="819" y1="36" x2="824" y2="39"/>
      <line x1="825" y1="46" x2="830" y2="49"/>
      <line x1="835" y1="52" x2="839" y2="55"/>
      <line x1="847" y1="59" x2="850" y2="62"/>
      <line x1="860" y1="61" x2="857" y2="55"/>
    </g>
    <rect x="857" y="9" width="5" height="5" fill="#e8c050"/>
  </g>

  <!-- BL: origin (11,529) -->
  <g filter="url(#gg)">
    <g stroke="#4a2c08" stroke-width="0.6" opacity="0.55">
      <line x1="11" y1="529" x2="61" y2="529"/>
      <line x1="11" y1="529" x2="59" y2="516"/>
      <line x1="11" y1="529" x2="52" y2="504"/>
      <line x1="11" y1="529" x2="46" y2="494"/>
      <line x1="11" y1="529" x2="36" y2="488"/>
      <line x1="11" y1="529" x2="24" y2="481"/>
      <line x1="11" y1="529" x2="11" y2="479"/>
    </g>
    <path d="M 61,529 A 50,50 0 0 0 11,479" fill="none" stroke="#a06820" stroke-width="2"/>
    <path d="M 45,529 A 34,34 0 0 0 11,495" fill="none" stroke="#c8901e" stroke-width="1" opacity="0.6"/>
    <g stroke="#d4a030" stroke-width="1.2" opacity="0.9">
      <line x1="61" y1="529" x2="58" y2="523"/>
      <line x1="46" y1="494" x2="49" y2="499"/>
      <line x1="11" y1="479" x2="14" y2="485"/>
    </g>
    <rect x="9" y="526" width="5" height="5" fill="#e8c050"/>
  </g>

  <!-- BR: origin (860,529) -->
  <g filter="url(#gg)">
    <g stroke="#4a2c08" stroke-width="0.6" opacity="0.55">
      <line x1="860" y1="529" x2="810" y2="529"/>
      <line x1="860" y1="529" x2="812" y2="516"/>
      <line x1="860" y1="529" x2="819" y2="504"/>
      <line x1="860" y1="529" x2="825" y2="494"/>
      <line x1="860" y1="529" x2="835" y2="488"/>
      <line x1="860" y1="529" x2="847" y2="481"/>
      <line x1="860" y1="529" x2="860" y2="479"/>
    </g>
    <path d="M 860,479 A 50,50 0 0 1 810,529" fill="none" stroke="#a06820" stroke-width="2"/>
    <path d="M 860,495 A 34,34 0 0 1 826,529" fill="none" stroke="#c8901e" stroke-width="1" opacity="0.6"/>
    <g stroke="#d4a030" stroke-width="1.2" opacity="0.9">
      <line x1="860" y1="479" x2="857" y2="485"/>
      <line x1="825" y1="494" x2="830" y2="499"/>
      <line x1="810" y1="529" x2="816" y2="523"/>
    </g>
    <rect x="857" y="526" width="5" height="5" fill="#e8c050"/>
  </g>

  <!-- RUNE SYMBOLS — left edge -->
  <g filter="url(#rg)" stroke="#5868d8" stroke-width="1.3" fill="none">
    <g transform="translate(22,80)"><polyline points="-4,-7 0,7 4,-7"/><line x1="-3" y1="0" x2="3" y2="0"/></g>
    <g transform="translate(22,140)"><line x1="-4" y1="-7" x2="-4" y2="7"/><line x1="-4" y1="-3" x2="3" y2="-3"/><line x1="-4" y1="3" x2="2" y2="3"/></g>
    <g transform="translate(22,200)"><line x1="0" y1="-7" x2="0" y2="7"/><line x1="-5" y1="-3" x2="5" y2="-3"/><line x1="-3" y1="4" x2="3" y2="4"/></g>
    <g transform="translate(22,260)"><line x1="-5" y1="0" x2="5" y2="0"/><polyline points="1,-5 5,0 1,5"/></g>
    <g transform="translate(22,320)"><line x1="-4" y1="-7" x2="4" y2="-7"/><line x1="0" y1="-7" x2="0" y2="7"/><line x1="-3" y1="7" x2="3" y2="7"/></g>
    <g transform="translate(22,380)"><polyline points="-5,-7 0,-1 5,-7"/><polyline points="-5,1 0,7 5,1"/></g>
    <g transform="translate(22,440)"><line x1="-4" y1="-7" x2="-4" y2="7"/><line x1="4" y1="-7" x2="4" y2="7"/><line x1="-4" y1="0" x2="4" y2="0"/></g>
  </g>

  <!-- RUNE SYMBOLS — right edge -->
  <g filter="url(#rg)" stroke="#5868d8" stroke-width="1.3" fill="none">
    <g transform="translate(849,80)"><polyline points="4,-7 0,7 -4,-7"/><line x1="-3" y1="0" x2="3" y2="0"/></g>
    <g transform="translate(849,140)"><line x1="4" y1="-7" x2="4" y2="7"/><line x1="-3" y1="-3" x2="4" y2="-3"/><line x1="-2" y1="3" x2="4" y2="3"/></g>
    <g transform="translate(849,200)"><line x1="0" y1="-7" x2="0" y2="7"/><line x1="-5" y1="-3" x2="5" y2="-3"/><line x1="-3" y1="4" x2="3" y2="4"/></g>
    <g transform="translate(849,260)"><line x1="-5" y1="0" x2="5" y2="0"/><polyline points="-1,-5 -5,0 -1,5"/></g>
    <g transform="translate(849,320)"><line x1="-4" y1="-7" x2="4" y2="-7"/><line x1="0" y1="-7" x2="0" y2="7"/><line x1="-3" y1="7" x2="3" y2="7"/></g>
    <g transform="translate(849,380)"><polyline points="-5,-7 0,-1 5,-7"/><polyline points="-5,1 0,7 5,1"/></g>
    <g transform="translate(849,440)"><line x1="-4" y1="-7" x2="-4" y2="7"/><line x1="4" y1="-7" x2="4" y2="7"/><line x1="-4" y1="0" x2="4" y2="0"/></g>
  </g>

  <!-- Card slot dividers -->
  <g stroke="#2a3c58" stroke-width="1" stroke-dasharray="5,8" opacity="0.38">
    <line x1="182" y1="20" x2="182" y2="520"/>
    <line x1="358" y1="20" x2="358" y2="520"/>
    <line x1="513" y1="20" x2="513" y2="520"/>
    <line x1="689" y1="20" x2="689" y2="520"/>
  </g>
</svg>
