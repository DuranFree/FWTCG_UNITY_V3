<svg xmlns="http://www.w3.org/2000/svg" width="871" height="540" viewBox="0 0 871 540">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#0c1422"/>
      <stop offset="50%" stop-color="#070d1a"/>
      <stop offset="100%" stop-color="#0a1220"/>
    </linearGradient>
    <linearGradient id="bH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#3a2008"/>
      <stop offset="20%" stop-color="#c88828"/>
      <stop offset="50%" stop-color="#e8b030"/>
      <stop offset="80%" stop-color="#c88828"/>
      <stop offset="100%" stop-color="#3a2008"/>
    </linearGradient>
    <linearGradient id="bV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#3a2008"/>
      <stop offset="30%" stop-color="#c88828"/>
      <stop offset="50%" stop-color="#e8b030"/>
      <stop offset="70%" stop-color="#c88828"/>
      <stop offset="100%" stop-color="#3a2008"/>
    </linearGradient>
    <linearGradient id="ig" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#1a2e50" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#0a1428" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#1a2e50" stop-opacity="0.25"/>
    </linearGradient>
    <filter id="g"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="871" height="540" fill="url(#bg)"/>
  <rect width="871" height="540" fill="url(#ig)"/>
  <!-- Subtle diagonals -->
  <g stroke="#0e1828" stroke-width="1" opacity="0.25">
    <line x1="0" y1="0" x2="871" y2="540"/>
    <line x1="0" y1="180" x2="691" y2="540"/>
    <line x1="180" y1="0" x2="871" y2="360"/>
    <line x1="871" y1="0" x2="0" y2="540"/>
    <line x1="691" y1="0" x2="0" y2="360"/>
    <line x1="871" y1="180" x2="180" y2="540"/>
  </g>
  <!-- Bronze border bars -->
  <rect x="0" y="0" width="871" height="8" fill="url(#bH)"/>
  <rect x="0" y="532" width="871" height="8" fill="url(#bH)"/>
  <rect x="0" y="0" width="8" height="540" fill="url(#bV)"/>
  <rect x="863" y="0" width="8" height="540" fill="url(#bV)"/>
  <!-- Inner borders -->
  <rect x="12" y="12" width="847" height="516" rx="2" fill="none" stroke="#8a5c18" stroke-width="1.2" opacity="0.7"/>
  <rect x="17" y="17" width="837" height="506" rx="1" fill="none" stroke="#c88828" stroke-width="0.6" opacity="0.3"/>
  <!-- Corner L-brackets -->
  <g stroke="#e8b030" stroke-width="3" fill="none" filter="url(#g)">
    <path d="M12,60 L12,12 L60,12"/>
    <path d="M811,12 L859,12 L859,60"/>
    <path d="M12,480 L12,528 L60,528"/>
    <path d="M811,528 L859,528 L859,480"/>
  </g>
  <g fill="#e8b030" filter="url(#g)">
    <rect x="10" y="10" width="6" height="6"/>
    <rect x="855" y="10" width="6" height="6"/>
    <rect x="10" y="524" width="6" height="6"/>
    <rect x="855" y="524" width="6" height="6"/>
  </g>
  <!-- Card slot dividers (5 slots) -->
  <g stroke="#2a3c58" stroke-width="1" stroke-dasharray="6,9" opacity="0.45">
    <line x1="182" y1="22" x2="182" y2="518"/>
    <line x1="358" y1="22" x2="358" y2="518"/>
    <line x1="513" y1="22" x2="513" y2="518"/>
    <line x1="689" y1="22" x2="689" y2="518"/>
  </g>
  <!-- Center marker (diamond — scale-invariant) -->
  <g filter="url(#g)" opacity="0.5">
    <polygon points="435,250 455,270 435,290 415,270" fill="none" stroke="#c88828" stroke-width="1.5"/>
    <polygon points="435,260 445,270 435,280 425,270" fill="#8a5c18" opacity="0.4"/>
  </g>
</svg>
