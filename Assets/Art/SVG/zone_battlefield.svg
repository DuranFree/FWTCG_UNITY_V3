<svg xmlns="http://www.w3.org/2000/svg" width="900" height="280" viewBox="0 0 900 280">
  <defs>
    <linearGradient id="bfBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d2040" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#060f20" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="bfEdge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2060b0" stop-opacity="0"/>
      <stop offset="20%" stop-color="#2060b0" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#4090d0" stop-opacity="1"/>
      <stop offset="80%" stop-color="#2060b0" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#2060b0" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="innerGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2060b0" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#1040a0" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#2060b0" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- 9-slice 边距标记：上下左右各 12px -->
  </defs>

  <!-- 主背景（9-slice 中间区域） -->
  <rect x="8" y="8" width="884" height="264" rx="10" fill="url(#bfBg)"/>

  <!-- 内发光填充 -->
  <rect x="8" y="8" width="884" height="264" rx="10" fill="url(#innerGlow)"/>

  <!-- 外框主线 -->
  <rect x="8" y="8" width="884" height="264" rx="10" fill="none" stroke="#2060b0" stroke-width="1.5" opacity="0.8"/>
  <!-- 内框细线 -->
  <rect x="11" y="11" width="878" height="258" rx="8" fill="none" stroke="#4090d0" stroke-width="0.5" opacity="0.3"/>

  <!-- 顶部发光边 -->
  <rect x="8" y="8" width="884" height="2" rx="1" fill="url(#bfEdge)" opacity="0.9"/>
  <!-- 底部发光边 -->
  <rect x="8" y="270" width="884" height="2" rx="1" fill="url(#bfEdge)" opacity="0.6"/>

  <!-- 中间竖向分割槽（卡槽间距示意：5格） -->
  <g stroke="#1a4070" stroke-width="0.8" stroke-dasharray="4,6" opacity="0.5">
    <line x1="188" y1="20" x2="188" y2="260"/>
    <line x1="364" y1="20" x2="364" y2="260"/>
    <line x1="540" y1="20" x2="540" y2="260"/>
    <line x1="716" y1="20" x2="716" y2="260"/>
  </g>

  <!-- 四角装饰 -->
  <g fill="none" stroke="#4090d0" stroke-width="1.2" opacity="0.7" filter="url(#glow)">
    <path d="M18,28 L18,18 L28,18"/>
    <path d="M882,28 L882,18 L872,18"/>
    <path d="M18,252 L18,262 L28,262"/>
    <path d="M882,252 L882,262 L872,262"/>
  </g>

  <!-- 控制权标记区（中心圆环） -->
  <circle cx="450" cy="140" r="20" fill="none" stroke="#2060b0" stroke-width="1" opacity="0.4"/>
  <circle cx="450" cy="140" r="14" fill="none" stroke="#4090d0" stroke-width="0.5" opacity="0.3"/>
  <circle cx="450" cy="140" r="5" fill="#2060b0" opacity="0.3"/>
</svg>
