<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="200" viewBox="0 0 1200 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#090e1c"/>
      <stop offset="60%" stop-color="#070c18"/>
      <stop offset="100%" stop-color="#040810"/>
    </linearGradient>
    <linearGradient id="fadeEdge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#040810" stop-opacity="1"/>
      <stop offset="6%"  stop-color="#040810" stop-opacity="0"/>
      <stop offset="94%" stop-color="#040810" stop-opacity="0"/>
      <stop offset="100%" stop-color="#040810" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="bronzeH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#3a2008"/>
      <stop offset="20%" stop-color="#c88828"/>
      <stop offset="50%" stop-color="#e8b030"/>
      <stop offset="80%" stop-color="#c88828"/>
      <stop offset="100%" stop-color="#3a2008"/>
    </linearGradient>
    <linearGradient id="bronzeV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#3a2008"/>
      <stop offset="30%" stop-color="#c88828"/>
      <stop offset="50%" stop-color="#e8b030"/>
      <stop offset="70%" stop-color="#c88828"/>
      <stop offset="100%" stop-color="#3a2008"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1200" height="200" fill="url(#bg)"/>
  <!-- Subtle diagonals -->
  <g stroke="#0c1422" stroke-width="0.8" opacity="0.3">
    <line x1="0" y1="0" x2="1200" y2="200"/>
    <line x1="0" y1="100" x2="1100" y2="200"/>
    <line x1="100" y1="0" x2="1200" y2="100"/>
    <line x1="1200" y1="0" x2="0" y2="200"/>
    <line x1="1100" y1="0" x2="0" y2="100"/>
    <line x1="1200" y1="100" x2="100" y2="200"/>
  </g>

  <!-- Bronze bars -->
  <rect x="0" y="0" width="1200" height="7" fill="url(#bronzeH)"/>
  <rect x="0" y="193" width="1200" height="7" fill="url(#bronzeH)"/>
  <rect x="0" y="0" width="7" height="200" fill="url(#bronzeV)"/>
  <rect x="1193" y="0" width="7" height="200" fill="url(#bronzeV)"/>

  <!-- Inner border -->
  <rect x="10" y="10" width="1180" height="180" rx="2" fill="none" stroke="#8a5c18" stroke-width="1" opacity="0.7"/>
  <rect x="14" y="14" width="1172" height="172" rx="1" fill="none" stroke="#c88828" stroke-width="0.5" opacity="0.3"/>

  <!-- Corner L-brackets -->
  <g stroke="#e8b030" stroke-width="2.5" fill="none" filter="url(#glow)">
    <path d="M10,38 L10,10 L38,10"/>
    <path d="M1162,10 L1190,10 L1190,38"/>
    <path d="M10,162 L10,190 L38,190"/>
    <path d="M1162,190 L1190,190 L1190,162"/>
  </g>
  <g fill="#e8b030" filter="url(#glow)">
    <rect x="8" y="8" width="5" height="5"/>
    <rect x="1187" y="8" width="5" height="5"/>
    <rect x="8" y="187" width="5" height="5"/>
    <rect x="1187" y="187" width="5" height="5"/>
  </g>

  <!-- Fade overlay (cards blend into edges) -->
  <rect width="1200" height="200" fill="url(#fadeEdge)"/>
</svg>
