<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="200" viewBox="0 0 1200 200">
  <defs>
    <linearGradient id="handBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#081828" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#030c18" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="handTop" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2060b0" stop-opacity="0"/>
      <stop offset="25%" stop-color="#2060b0" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#3080d0" stop-opacity="0.8"/>
      <stop offset="75%" stop-color="#2060b0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#2060b0" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="handFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#030c18" stop-opacity="0.9"/>
      <stop offset="10%" stop-color="#030c18" stop-opacity="0"/>
      <stop offset="90%" stop-color="#030c18" stop-opacity="0"/>
      <stop offset="100%" stop-color="#030c18" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- 托盘底板 -->
  <rect x="0" y="16" width="1200" height="184" rx="12" fill="url(#handBg)"/>

  <!-- 左右淡出遮罩 -->
  <rect x="0" y="16" width="1200" height="184" rx="12" fill="url(#handFade)"/>

  <!-- 顶部发光线 -->
  <rect x="0" y="16" width="1200" height="2" fill="url(#handTop)"/>

  <!-- 顶部内框线 -->
  <rect x="4" y="20" width="1192" height="176" rx="10" fill="none" stroke="#2060b0" stroke-width="0.5" opacity="0.25"/>

  <!-- 底部细边 -->
  <rect x="60" y="196" width="1080" height="1" fill="#2060b0" opacity="0.3"/>

  <!-- 四角小装饰 -->
  <g fill="none" stroke="#3070c0" stroke-width="1" opacity="0.5">
    <path d="M12,32 L12,22 L22,22"/>
    <path d="M1188,32 L1188,22 L1178,22"/>
  </g>
</svg>
