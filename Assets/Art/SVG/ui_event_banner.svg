<svg xmlns="http://www.w3.org/2000/svg" width="800" height="120" viewBox="0 0 800 120">
  <defs>
    <linearGradient id="bannerBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#060c18" stop-opacity="0"/>
      <stop offset="8%" stop-color="#0a1828" stop-opacity="0.92"/>
      <stop offset="50%" stop-color="#0e2040" stop-opacity="0.97"/>
      <stop offset="92%" stop-color="#0a1828" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#060c18" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bannerTop" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4090d0" stop-opacity="0"/>
      <stop offset="15%" stop-color="#4090d0" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#60b0ff" stop-opacity="1"/>
      <stop offset="85%" stop-color="#4090d0" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4090d0" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bannerBot" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2060b0" stop-opacity="0"/>
      <stop offset="20%" stop-color="#2060b0" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#4080d0" stop-opacity="0.8"/>
      <stop offset="80%" stop-color="#2060b0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#2060b0" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 主底板 -->
  <rect x="0" y="10" width="800" height="100" fill="url(#bannerBg)"/>

  <!-- 顶部发光线 -->
  <rect x="0" y="10" width="800" height="2" fill="url(#bannerTop)" filter="url(#glow)"/>
  <!-- 底部线 -->
  <rect x="0" y="108" width="800" height="1.5" fill="url(#bannerBot)"/>

  <!-- 左右端点装饰（箭头感） -->
  <polygon points="0,60 24,24 24,96" fill="#0a1828" opacity="0.8"/>
  <polygon points="0,60 24,24 24,96" fill="none" stroke="#2060b0" stroke-width="1" opacity="0.6"/>
  <polygon points="800,60 776,24 776,96" fill="#0a1828" opacity="0.8"/>
  <polygon points="800,60 776,24 776,96" fill="none" stroke="#2060b0" stroke-width="1" opacity="0.6"/>

  <!-- 左右内侧竖线 -->
  <line x1="32" y1="18" x2="32" y2="102" stroke="#2060b0" stroke-width="0.8" opacity="0.4"/>
  <line x1="768" y1="18" x2="768" y2="102" stroke="#2060b0" stroke-width="0.8" opacity="0.4"/>

  <!-- 中心文字区分隔 -->
  <line x1="60" y1="18" x2="740" y2="18" stroke="#1a3a60" stroke-width="0.5" opacity="0.3"/>
  <line x1="60" y1="102" x2="740" y2="102" stroke="#1a3a60" stroke-width="0.5" opacity="0.3"/>

  <!-- 中心小装饰点 -->
  <circle cx="400" cy="10" r="3" fill="#4090d0" opacity="0.7" filter="url(#glow)"/>
  <circle cx="400" cy="110" r="3" fill="#4090d0" opacity="0.5" filter="url(#glow)"/>
</svg>
