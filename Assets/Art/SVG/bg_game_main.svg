<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <radialGradient id="bgCenter" cx="50%" cy="50%" r="60%">
      <stop offset="0%"  stop-color="#101828"/>
      <stop offset="50%" stop-color="#080e18"/>
      <stop offset="100%" stop-color="#040810"/>
    </radialGradient>
    <radialGradient id="swirlGlow" cx="50%" cy="50%" r="35%">
      <stop offset="0%"  stop-color="#1a2840" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#040810" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="vigH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#020408" stop-opacity="0.8"/>
      <stop offset="15%" stop-color="#020408" stop-opacity="0"/>
      <stop offset="85%" stop-color="#020408" stop-opacity="0"/>
      <stop offset="100%" stop-color="#020408" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="vigV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#020408" stop-opacity="0.8"/>
      <stop offset="12%" stop-color="#020408" stop-opacity="0"/>
      <stop offset="88%" stop-color="#020408" stop-opacity="0"/>
      <stop offset="100%" stop-color="#020408" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="glow5"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- Deep dark base -->
  <rect width="1920" height="1080" fill="url(#bgCenter)"/>

  <!-- Subtle diagonal leather-like lines -->
  <g stroke="#0e1624" stroke-width="1" opacity="0.4">
    <line x1="0" y1="0" x2="1920" y2="1080"/>
    <line x1="0" y1="108" x2="1812" y2="1080"/>
    <line x1="108" y1="0" x2="1920" y2="972"/>
    <line x1="0" y1="216" x2="1704" y2="1080"/>
    <line x1="216" y1="0" x2="1920" y2="864"/>
    <line x1="0" y1="324" x2="1596" y2="1080"/>
    <line x1="324" y1="0" x2="1920" y2="756"/>
    <line x1="1920" y1="0" x2="0" y2="1080"/>
    <line x1="1920" y1="108" x2="108" y2="1080"/>
    <line x1="1812" y1="0" x2="0" y2="972"/>
    <line x1="1920" y1="216" x2="216" y2="1080"/>
    <line x1="1704" y1="0" x2="0" y2="864"/>
  </g>

  <!-- Grid overlay -->
  <g stroke="#121e32" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="270" x2="1920" y2="270"/>
    <line x1="0" y1="540" x2="1920" y2="540"/>
    <line x1="0" y1="810" x2="1920" y2="810"/>
    <line x1="480" y1="0" x2="480" y2="1080"/>
    <line x1="960" y1="0" x2="960" y2="1080"/>
    <line x1="1440" y1="0" x2="1440" y2="1080"/>
  </g>

  <!-- Center swirl glow -->
  <ellipse cx="960" cy="540" rx="700" ry="420" fill="url(#swirlGlow)"/>

  <!-- Spiral arms (subtle) -->
  <g fill="none" stroke="#162030" stroke-width="1.5" opacity="0.5">
    <path d="M960,540 Q1100,420 1200,320 Q1320,200 1280,100"/>
    <path d="M960,540 Q820,420 720,320 Q600,200 640,100"/>
    <path d="M960,540 Q1100,660 1200,760 Q1320,880 1280,980"/>
    <path d="M960,540 Q820,660 720,760 Q600,880 640,980"/>
  </g>
  <g fill="none" stroke="#162030" stroke-width="1" opacity="0.3">
    <circle cx="960" cy="540" r="320"/>
    <circle cx="960" cy="540" r="200"/>
    <circle cx="960" cy="540" r="100"/>
  </g>

  <!-- Vignette sides -->
  <rect width="1920" height="1080" fill="url(#vigH)"/>
  <rect width="1920" height="1080" fill="url(#vigV)"/>
</svg>
