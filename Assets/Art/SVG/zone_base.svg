<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="baseBg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#0e1e30"/>
      <stop offset="100%" stop-color="#060c18"/>
    </radialGradient>
    <radialGradient id="baseGlow" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#2060b0" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#2060b0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hpBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#20c040"/>
      <stop offset="60%" stop-color="#18a030"/>
      <stop offset="100%" stop-color="#108020"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 八边形底座 -->
  <polygon points="100,8 158,28 188,80 188,120 158,172 100,192 42,172 12,120 12,80 42,28"
    fill="url(#baseBg)" stroke="#2060b0" stroke-width="2" opacity="0.9"/>
  <polygon points="100,14 152,32 180,80 180,120 152,168 100,186 48,168 20,120 20,80 48,32"
    fill="none" stroke="#4090d0" stroke-width="0.5" opacity="0.3"/>

  <!-- 中心光晕 -->
  <circle cx="100" cy="100" r="60" fill="url(#baseGlow)"/>

  <!-- 盾牌图形（徽章） -->
  <path d="M100,40 L136,58 L136,100 Q136,130 100,148 Q64,130 64,100 L64,58 Z"
    fill="#0a1828" stroke="#2060b0" stroke-width="1.5" opacity="0.85"/>
  <path d="M100,48 L130,64 L130,100 Q130,124 100,140 Q70,124 70,100 L70,64 Z"
    fill="none" stroke="#4090d0" stroke-width="0.8" opacity="0.4"/>

  <!-- 盾中心装饰 -->
  <polygon points="100,62 108,82 130,82 113,94 120,115 100,102 80,115 87,94 70,82 92,82"
    fill="#1a4080" stroke="#4090d0" stroke-width="0.8" opacity="0.6" filter="url(#glow)"/>

  <!-- HP 数值底框 -->
  <rect x="60" y="155" width="80" height="22" rx="4" fill="#061020" stroke="#2060b0" stroke-width="1" opacity="0.8"/>
  <!-- HP 条 -->
  <rect x="63" y="158" width="60" height="16" rx="3" fill="#0a1828"/>
  <rect x="63" y="158" width="48" height="16" rx="3" fill="url(#hpBar)" opacity="0.85"/>

  <!-- 角落装饰 -->
  <g fill="none" stroke="#3070c0" stroke-width="1" opacity="0.5">
    <path d="M12,30 L12,18 L24,18"/>
    <path d="M188,30 L188,18 L176,18"/>
    <path d="M12,170 L12,182 L24,182"/>
    <path d="M188,170 L188,182 L176,182"/>
  </g>
</svg>
